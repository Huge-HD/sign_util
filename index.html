<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>广州飞鱼信息科技签名验证、喇叭调试工具</title>
	<link rel="stylesheet" type="text/css" href="css/main.css">
	<link rel="stylesheet" type="text/css" href="css/bootstrap-theme.min.css">
	<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">

	<script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
	<script src="js/md5.js" type="text/javascript" charset="utf-8"></script>
	<script src="https://cdn.staticfile.org/axios/0.18.0/axios.min.js"></script>

	<div class="main-container">
		<div class="page-header">
			<h1>广州飞鱼信息科技云喇叭调试工具</h1>
			<small>签名验证 · 接口调试 · 一站式工具</small>
		</div>
		<div class="container">
			<div class="row form-group">
				<label class="control-label col-lg-2" for="type">type</label>
				<div class="col-lg-5 col-md-6">
					<div class="dropdown">
						<select class="select-container" id="select_id">
							<option value="1">1</option>
							<option value="7">7</option>
							<option value="10">10</option>
							<option value="33">33</option>
						</select>
					</div>
				</div>
			</div>
			<div class="row form-group">
				<label class="control-label col-lg-2" for="appKey">appKey</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="appKey" value="" type="text">
				</div>
			</div>
			<div class="row form-group">
				<label class="control-label col-lg-2" for="appSecret">appSecret</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="appSecret" value="" type="text">
				</div>
			</div>
			<div class="row form-group">
				<label class="control-label col-lg-2" for="device">device</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="device" value="" type="text">
				</div>
			</div>

			<div class="row form-group" id="price">
				<label class="control-label col-lg-2" for="price">price</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="price" value="" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">以分为单位，不要输入小数点</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group" id="priceType">
				<label class="control-label col-lg-2" for="priceType">priceType</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="priceType" value="" type="text">
				</div>
			</div>

			<div class="row form-group" id="money" hidden="hidden">
				<label class="control-label col-lg-2" for="money">money</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="money" value="" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">以元为单位，保留两位小数</span></div>
					</div>
				</div>
			</div>
			<div class="row form-group" id="broadcast_type" hidden="hidden">
				<label class="control-label col-lg-2" for="broadcast_type">broadcast_type</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="broadcast_type" value="" type="text">
				</div>
			</div>
			<div class="row form-group" id="request_id" hidden="hidden">
				<label class="control-label col-lg-2" for="request_id">request_id</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="request_id" value="" type="text">
				</div>
			</div>

			<div class="row form-group" id="biz_type" hidden="hidden">
				<label class="control-label col-lg-2" for="biz_type">biz_type</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="biz_type" value="1" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">预留字段，暂时传 1</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="str">str</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="str" value="" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">随机字符串，每次测试都要不同</span></div>
					</div>
				</div>
			</div>
			<div class="row form-group" id="context" hidden="hidden">
				<label class="control-label col-lg-2" for="context">context</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="context" value="" type="text">
				</div>
			</div>

			<hr class="section-divider">

			<div class="row form-group">
				<label class="control-label col-lg-2" for="strText">参数拼接</label>
				<div class="col-lg-5 col-md-6 parameter" id="strText">

				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="sign">sign</label>
				<div class="col-lg-5 col-md-6" id="signTxt">

				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="parameter">接口传参</label>
				<div class="col-lg-5 col-md-6 parameter" id="parameter">

				</div>
			</div>

			<div class="btn-container btn-group btn-group-lg">
				<button type="button" class="btn btn-default" id="signBtn">签名</button>
			</div>
			<div class="btn-container btn-group btn-group-lg">
				<button type="button" class="btn btn-default" id="pubBtn">推送一笔</button>
			</div>

			<div class="row form-group response-container">
				<label class="control-label col-lg-2" for="response">返回结果</label>
				<div class="col-lg-5 col-md-6" id="response">

				</div>
			</div>

		</div>
	</div>
	<script>
		$(function() {
			$("#select_id").change(function() {
				var checkValue = $("#select_id").val();
				console.log(checkValue)
				if (checkValue == 1) {
					$("#priceType").show();
					$("#price").show();
					$("#context").hide();
					$("#money").hide();
					$("#broadcast_type").hide();
					$("#request_id").hide();
					$("#biz_type").hide();
				} else if (checkValue == 10 || checkValue == 7) {
					$("#priceType").hide();
					$("#price").hide();
					$("#money").hide();
					$("#broadcast_type").hide();
					$("#request_id").hide();
					$("#biz_type").hide();
					$("#context").show();
				} else if(checkValue == 33){
					$("#priceType").hide();
					$("#price").hide();
					$("#context").show();
					$("#money").hide();
					$("#broadcast_type").hide();
					$("#request_id").hide();
					$("#biz_type").hide();
				}
			});
			$("#signBtn").click(function() {
				var typeVal = $("#select_id").val();
				console.log(typeVal)
				var appKey = $("input[name='appKey']");
				var appSecret = $("input[name='appSecret']");
				var device = $("input[name='device']");
				var price = $("input[name='price']");
				var priceType = $("input[name='priceType']");
				var str = $("input[name='str']");
				var context = $("input[name='context']");
				var money = $("input[name='money']");
				var broadcast_type = $("input[name='broadcast_type']");
				var request_id = $("input[name='request_id']");
				var biz_type = $("input[name='biz_type']");
				console.log(appKey.val())
				console.log(appSecret.val())
				console.log(device.val())
				console.log(priceType.val())
				console.log(str.val())
				console.log(context.val())
				if (appKey.val() == "") {
					return alert("appKey不能为空")
				} else if (appSecret.val() == "") {
					return alert("appSecret不能为空")
				} else if (device.val() == "") {
					return alert("device不能为空")
				} else if (str.val() == "") {
					return alert("str不能为空")
				}
				if (typeVal == 1) {
					if (priceType.val() == "") {
						return alert("priceType不能为空")
					} else {
						var string = "appKey=" + appKey.val() + "&device=" + device.val() + "&price=" + price.val() + "&priceType=" +
							priceType.val() + "&str=" + str.val() + "&type=" + typeVal + appSecret.val()
						var md5_str = md5(string).toUpperCase();
						console.log(md5_str)
						var parameter = {
							appKey: appKey.val(),
							device: device.val(),
							price: price.val(),
							priceType: priceType.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
						$("#strText").text(string);
						$("#signTxt").text(md5_str);
						$("#parameter").text(JSON.stringify(parameter));
					}
				} else if(typeVal == 10 || typeVal == 7){
					if (context.val() == "") {
						return alert("context不能为空")
					} else {
						var string = "appKey=" + appKey.val() + "&context=" + context.val() + "&device=" + device.val() + "&str=" +
							str.val() + "&type=" + typeVal + appSecret.val()
						var md5_str = md5(string).toUpperCase();
						console.log(md5_str)
						var parameter = {
							appKey: appKey.val(),
							device: device.val(),
							context: context.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
						$("#strText").text(string);
						$("#signTxt").text(md5_str);
						$("#parameter").text(JSON.stringify(parameter));
					}
				}else if(typeVal == 33){
					if (context.val() == "") {
						return alert("context不能为空")
					} else {
						var string = "appKey=" + appKey.val() + "&context=" + context.val() + "&device=" + device.val() + "&str=" +
							str.val() + "&type=" + typeVal + appSecret.val()
						var md5_str = md5(string).toUpperCase();
						console.log(md5_str)
						var parameter = {
							appKey: appKey.val(),
							device: device.val(),
							context: context.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
						$("#strText").text(string);
						$("#signTxt").text(md5_str);
						$("#parameter").text(JSON.stringify(parameter));
					}
				}else{
					return alert("设备类型不存在")
				}
			})
			$("#pubBtn").click(function() {
				var typeVal = $("#select_id").val();
				var appKey = $("input[name='appKey']");
				var appSecret = $("input[name='appSecret']");
				var device = $("input[name='device']");
				var price = $("input[name='price']");
				var priceType = $("input[name='priceType']");
				var str = $("input[name='str']");
				var context = $("input[name='context']");
				var money = $("input[name='money']");
				var broadcast_type = $("input[name='broadcast_type']");
				var request_id = $("input[name='request_id']");
				var biz_type = $("input[name='biz_type']");
				if (appKey.val() == "") {
					return alert("appKey不能为空")
				} else if (appSecret.val() == "") {
					return alert("appSecret不能为空")
				} else if (device.val() == "") {
					return alert("device不能为空")
				} else if (str.val() == "") {
					return alert("str不能为空")
				}
				if (typeVal == 1) {
					if (priceType.val() == "") {
						return alert("priceType不能为空")
					} else {
						var string = "appKey=" + appKey.val() + "&device=" + device.val() + "&price=" + price.val() + "&priceType=" +
							priceType.val() + "&str=" + str.val() + "&type=" + typeVal + appSecret.val()
						var md5_str = md5(string).toUpperCase();
						var parameter = {
							appKey: appKey.val(),
							device: device.val(),
							price: price.val(),
							priceType: priceType.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
						$("#strText").text(string);
						$("#signTxt").text(md5_str);
						$("#parameter").text(JSON.stringify(parameter));
						axios.post('https://open.gzfyit.com/iot-cloud/v1/third/send', {
								appKey: appKey.val(),
								device: device.val(),
								price: price.val(),
								priceType: priceType.val(),
								str: str.val(),
								type: typeVal,
								sign: md5_str
							})
							.then(function(response) {
								console.log(response);
								$("#response").text(JSON.stringify(response.data));
							})
							.catch(function(error) {
								console.log(error);
							});
					}
				} else  if(typeVal == 10 || typeVal == 7){
					if (context.val() == "") {
						return alert("context不能为空")
					} else {
						var string = "appKey=" + appKey.val() + "&context=" + context.val() + "&device=" + device.val() + "&str=" +
							str.val() + "&type=" + typeVal + appSecret.val()
						var md5_str = md5(string).toUpperCase();
						var parameter = {
							appKey: appKey.val(),
							device: device.val(),
							context: context.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
						$("#strText").text(string);
						$("#signTxt").text(md5_str);
						$("#parameter").text(JSON.stringify(parameter));
						axios.post('https://open.gzfyit.com/iot-cloud/v1/third/send', {
								appKey: appKey.val(),
								device: device.val(),
								context: context.val(),
								str: str.val(),
								type: typeVal,
								sign: md5_str
							})
							.then(function(response) {
								console.log(response);
								$("#response").text(JSON.stringify(response.data));
							})
							.catch(function(error) {
								console.log(error);
							});
					}
				}else if(typeVal == 33){
					if (context.val() == "") {
						return alert("context不能为空")
					} else {
						var string = "appKey=" + appKey.val() + "&context=" + context.val() + "&device=" + device.val() + "&str=" +
							str.val() + "&type=" + typeVal + appSecret.val()
						var md5_str = md5(string).toUpperCase();
						console.log(md5_str)
						var parameter = {
							appKey: appKey.val(),
							device: device.val(),
							context: context.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
						$("#strText").text(string);
						$("#signTxt").text(md5_str);
						$("#parameter").text(JSON.stringify(parameter));
						axios.post('https://open.gzfyit.com/iot-cloud/v1/third/send', {
								appKey: appKey.val(),
								device: device.val(),
								context: context.val(),
								str: str.val(),
								type: typeVal,
								sign: md5_str
							})
							.then(function(response) {
								console.log(response);
								$("#response").text(JSON.stringify(response.data));
							})
							.catch(function(error) {
								console.log(error);
							});
					}
				}else{
					return alert("设备类型不存在")
				}
			})
		});
	</script>

</body>
</html>
