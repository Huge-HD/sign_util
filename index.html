<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>广州飞鱼信息科技签名验证、喇叭调试工具</title>
	<link rel="stylesheet" type="text/css" href="css/main.css">
	<link rel="stylesheet" type="text/css" href="css/bootstrap-theme.min.css">
	<link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">

	<script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
	<script src="js/md5.js" type="text/javascript" charset="utf-8"></script>
	<script src="https://cdn.staticfile.org/axios/0.18.0/axios.min.js"></script>

	<div class="main-container">
		<div class="page-header">
			<h1>广州飞鱼信息科技云喇叭调试工具</h1>
			<small>签名验证 · 接口调试 · 一站式工具</small>
		</div>
		<div class="container">
			<div class="row form-group">
				<label class="control-label col-lg-2" for="type">type</label>
				<div class="col-lg-5 col-md-6">
					<div class="dropdown">
						<select class="select-container" id="select_id">
							<option value="1">1</option>
							<option value="7">7</option>
							<option value="10">10</option>
							<option value="33">33</option>
						</select>
					</div>
				</div>
			</div>
			<div class="row form-group">
				<label class="control-label col-lg-2" for="appKey">appKey</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="appKey" value="" type="text">
				</div>
			</div>
			<div class="row form-group">
				<label class="control-label col-lg-2" for="appSecret">appSecret</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="appSecret" value="" type="text">
				</div>
			</div>
			<div class="row form-group">
				<label class="control-label col-lg-2" for="device">device</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="device" value="" type="text">
				</div>
			</div>

			<div class="row form-group" id="price">
				<label class="control-label col-lg-2" for="price">price</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="price" value="" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">以分为单位，不要输入小数点</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group" id="priceType">
				<label class="control-label col-lg-2" for="priceType">priceType</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="priceType" value="" type="text">
				</div>
			</div>

			<div class="row form-group" id="money" hidden="hidden">
				<label class="control-label col-lg-2" for="money">money</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="money" value="" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">以元为单位，保留两位小数</span></div>
					</div>
				</div>
			</div>
			<div class="row form-group" id="broadcast_type" hidden="hidden">
				<label class="control-label col-lg-2" for="broadcast_type">broadcast_type</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="broadcast_type" value="" type="text">
				</div>
			</div>
			<div class="row form-group" id="request_id" hidden="hidden">
				<label class="control-label col-lg-2" for="request_id">request_id</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="request_id" value="" type="text">
				</div>
			</div>

			<div class="row form-group" id="biz_type" hidden="hidden">
				<label class="control-label col-lg-2" for="biz_type">biz_type</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="biz_type" value="1" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">预留字段，暂时传 1</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="str">str</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
					  <div class="col-md-8 input-container"><input class="form-control" name="str" value="" type="text"></div>
					  <div class="col-md-4 span-container"><span class="label label-warning">随机字符串，每次测试都要不同</span></div>
					</div>
				</div>
			</div>
			<div class="row form-group" id="context" hidden="hidden">
				<label class="control-label col-lg-2" for="context">context</label>
				<div class="col-lg-5 col-md-6">
					<input class="form-control" name="context" value="" type="text">
				</div>
			</div>

			<hr class="section-divider">

			<div class="row form-group">
				<label class="control-label col-lg-2" for="strText">参数拼接</label>
				<div class="col-lg-5 col-md-6 parameter" id="strText">

				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="sign">sign</label>
				<div class="col-lg-5 col-md-6" id="signTxt">

				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="parameter">接口传参</label>
				<div class="col-lg-5 col-md-6 parameter" id="parameter">

				</div>
			</div>

			<div class="btn-container btn-group btn-group-lg">
				<button type="button" class="btn btn-default" id="signBtn">签名</button>
			</div>
			<div class="btn-container btn-group btn-group-lg">
				<button type="button" class="btn btn-default" id="pubBtn">推送一笔</button>
			</div>

			<div class="row form-group response-container">
				<label class="control-label col-lg-2" for="response">返回结果</label>
				<div class="col-lg-5 col-md-6" id="response">

				</div>
			</div>

		</div>

		<!-- 压力测试面板 -->
		<div class="container stress-panel">
			<div class="stress-header">
				<h2>压力测试</h2>
				<small>定时循环推送，context 金额自动累加</small>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="initAmount">起始金额</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
						<div class="col-md-6 input-container"><input class="form-control" id="initAmount" value="0.01" type="number" step="0.01" min="0.01"></div>
						<div class="col-md-6 span-container"><span class="label label-warning">第一笔金额（元）</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="stepAmount">累加步长</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
						<div class="col-md-6 input-container"><input class="form-control" id="stepAmount" value="0.01" type="number" step="0.01" min="0.01"></div>
						<div class="col-md-6 span-container"><span class="label label-warning">每次累加金额（元）</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="intervalSec">推送间隔</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
						<div class="col-md-6 input-container"><input class="form-control" id="intervalSec" value="2" type="number" step="0.1" min="0.5"></div>
						<div class="col-md-6 span-container"><span class="label label-warning">秒，最小 0.5 秒</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="totalCount">推送次数</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
						<div class="col-md-6 input-container"><input class="form-control" id="totalCount" value="100" type="number" step="1" min="1"></div>
						<div class="col-md-6 span-container"><span class="label label-warning">0 = 不限次数</span></div>
					</div>
				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2" for="contextPattern">context 模板</label>
				<div class="col-lg-5 col-md-6">
					<div class="row">
						<div class="col-md-8 input-container"><input class="form-control" id="contextPattern" value="" type="text" placeholder="如：微信收款成功{amount}元"></div>
						<div class="col-md-4 span-container"><span class="label label-warning">{amount} 会被替换为金额</span></div>
					</div>
				</div>
			</div>

			<!-- 状态展示 -->
			<div class="row form-group">
				<label class="control-label col-lg-2">运行状态</label>
				<div class="col-lg-5 col-md-6">
					<div class="stress-status" id="stressStatus">
						<span class="status-badge status-idle">空闲</span>
						<span class="status-info" id="stressProgress">--</span>
					</div>
				</div>
			</div>

			<div class="row form-group">
				<label class="control-label col-lg-2">推送日志</label>
				<div class="col-lg-5 col-md-6">
					<div class="stress-log" id="stressLog">
						<div class="log-empty">等待开始推送…</div>
					</div>
				</div>
			</div>

			<div class="stress-btns">
				<button type="button" class="btn stress-btn-start" id="stressStartBtn">开始压测</button>
				<button type="button" class="btn stress-btn-stop" id="stressStopBtn" disabled>停止</button>
				<button type="button" class="btn stress-btn-clear" id="stressClearBtn">清空日志</button>
			</div>
		</div>
	</div>
	<script>
		$(function() {
			// ==================== 从浏览器读取已保存的凭证 ====================
			var savedAppKey = localStorage.getItem('fly_sign_appKey') || '';
			var savedAppSecret = localStorage.getItem('fly_sign_appSecret') || '';
			var savedDevice = localStorage.getItem('fly_sign_device') || '';
			$("input[name='appKey']").val(savedAppKey);
			$("input[name='appSecret']").val(savedAppSecret);
			$("input[name='device']").val(savedDevice);

			// 输入时自动保存到浏览器
			$("input[name='appKey']").on('input', function() {
				localStorage.setItem('fly_sign_appKey', $(this).val());
			});
			$("input[name='appSecret']").on('input', function() {
				localStorage.setItem('fly_sign_appSecret', $(this).val());
			});
			$("input[name='device']").on('input', function() {
				localStorage.setItem('fly_sign_device', $(this).val());
			});

			$("#select_id").change(function() {
				var checkValue = $("#select_id").val();
				console.log(checkValue)
				if (checkValue == 1) {
					$("#priceType").show();
					$("#price").show();
					$("#context").hide();
					$("#money").hide();
					$("#broadcast_type").hide();
					$("#request_id").hide();
					$("#biz_type").hide();
				} else if (checkValue == 10 || checkValue == 7) {
					$("#priceType").hide();
					$("#price").hide();
					$("#money").hide();
					$("#broadcast_type").hide();
					$("#request_id").hide();
					$("#biz_type").hide();
					$("#context").show();
				} else if(checkValue == 33){
					$("#priceType").hide();
					$("#price").hide();
					$("#context").show();
					$("#money").hide();
					$("#broadcast_type").hide();
					$("#request_id").hide();
					$("#biz_type").hide();
				}
			});

			// 生成随机字符串
			function randomStr(len) {
				len = len || 16;
				var chars = 'ABCDEFGHJKMNPQRSTWXYZabcdefhijkmnprstwxyz2345678';
				var result = '';
				for (var i = 0; i < len; i++) {
					result += chars.charAt(Math.floor(Math.random() * chars.length));
				}
				return result;
			}

			// 生成签名参数
			function buildSign(typeVal) {
				var appKey = $("input[name='appKey']");
				var appSecret = $("input[name='appSecret']");
				var device = $("input[name='device']");
				var price = $("input[name='price']");
				var priceType = $("input[name='priceType']");
				var str = $("input[name='str']");
				var context = $("input[name='context']");

				if (typeVal == 1) {
					var string = "appKey=" + appKey.val() + "&device=" + device.val() + "&price=" + price.val() + "&priceType=" +
						priceType.val() + "&str=" + str.val() + "&type=" + typeVal + appSecret.val();
					var md5_str = md5(string).toUpperCase();
					return {
						string: string,
						sign: md5_str,
						params: {
							appKey: appKey.val(),
							device: device.val(),
							price: price.val(),
							priceType: priceType.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
					};
				} else {
					var string = "appKey=" + appKey.val() + "&context=" + context.val() + "&device=" + device.val() + "&str=" +
						str.val() + "&type=" + typeVal + appSecret.val();
					var md5_str = md5(string).toUpperCase();
					return {
						string: string,
						sign: md5_str,
						params: {
							appKey: appKey.val(),
							device: device.val(),
							context: context.val(),
							str: str.val(),
							type: typeVal,
							sign: md5_str
						}
					};
				}
			}

			$("#signBtn").click(function() {
				var typeVal = $("#select_id").val();
				var appKey = $("input[name='appKey']");
				var appSecret = $("input[name='appSecret']");
				var device = $("input[name='device']");
				var priceType = $("input[name='priceType']");
				var str = $("input[name='str']");
				var context = $("input[name='context']");

				if (appKey.val() == "") return alert("appKey不能为空");
				if (appSecret.val() == "") return alert("appSecret不能为空");
				if (device.val() == "") return alert("device不能为空");
				if (str.val() == "") return alert("str不能为空");

				if (typeVal == 1) {
					if (priceType.val() == "") return alert("priceType不能为空");
				} else {
					if (context.val() == "") return alert("context不能为空");
				}

				var result = buildSign(typeVal);
				$("#strText").text(result.string);
				$("#signTxt").text(result.sign);
				$("#parameter").text(JSON.stringify(result.params));
			});

			$("#pubBtn").click(function() {
				var typeVal = $("#select_id").val();
				var appKey = $("input[name='appKey']");
				var appSecret = $("input[name='appSecret']");
				var device = $("input[name='device']");
				var priceType = $("input[name='priceType']");
				var str = $("input[name='str']");
				var context = $("input[name='context']");

				if (appKey.val() == "") return alert("appKey不能为空");
				if (appSecret.val() == "") return alert("appSecret不能为空");
				if (device.val() == "") return alert("device不能为空");
				if (str.val() == "") return alert("str不能为空");

				if (typeVal == 1) {
					if (priceType.val() == "") return alert("priceType不能为空");
				} else {
					if (context.val() == "") return alert("context不能为空");
				}

				var result = buildSign(typeVal);
				$("#strText").text(result.string);
				$("#signTxt").text(result.sign);
				$("#parameter").text(JSON.stringify(result.params));

				axios.post('https://open.gzfyit.com/iot-cloud/v1/third/send', result.params)
					.then(function(response) {
						console.log(response);
						$("#response").text(JSON.stringify(response.data));
					})
					.catch(function(error) {
						console.log(error);
						$("#response").text("请求失败: " + (error.message || "网络错误"));
					});
			});

			// ==================== 压力测试 ====================
			var stressTimer = null;
			var stressRunning = false;
			var stressCount = 0;
			var stressTotal = 0;
			var stressSuccess = 0;
			var stressFail = 0;
			var stressCurrentAmount = 0;
			var stressMaxLog = 50; // 最多保留50条日志

			function setStressStatus(status, text) {
				var badge = $("#stressStatus .status-badge");
				badge.removeClass("status-idle status-running status-stopped");
				if (status === "running") {
					badge.addClass("status-running").text("运行中");
				} else if (status === "stopped") {
					badge.addClass("status-stopped").text("已停止");
				} else {
					badge.addClass("status-idle").text("空闲");
				}
				$("#stressProgress").text(text);
			}

			function addStressLog(level, msg) {
				var logEl = $("#stressLog");
				// 移除空提示
				logEl.find(".log-empty").remove();
				var now = new Date();
				var time = now.getHours().toString().padStart(2, "0") + ":" +
					now.getMinutes().toString().padStart(2, "0") + ":" +
					now.getSeconds().toString().padStart(2, "0");
				var cls = "log-" + level;
				var entry = $("<div class='log-entry " + cls + "'><span class='log-time'>" + time + "</span><span class='log-msg'>" + msg + "</span></div>");
				logEl.prepend(entry);
				// 限制日志条数
				var entries = logEl.find(".log-entry");
				if (entries.length > stressMaxLog) {
					entries.slice(stressMaxLog).remove();
				}
			}

			function doStressPush() {
				if (!stressRunning) return;

				stressCount++;
				var totalCountVal = parseInt($("#totalCount").val()) || 0;
				var step = parseFloat($("#stepAmount").val()) || 0.01;

				// 更新当前金额
				var amountStr = stressCurrentAmount.toFixed(2);

				// 替换 context 模板中的 {amount}
				var pattern = $("#contextPattern").val() || "{amount}";
				var contextText = pattern.replace(/\{amount\}/g, amountStr);

				// 生成随机 str
				var strVal = randomStr(16);
				$("input[name='str']").val(strVal);
				$("input[name='context']").val(contextText);

				var typeVal = $("#select_id").val();
				var appKey = $("input[name='appKey']");

				if (appKey.val() == "") {
					addStressLog("error", "appKey 为空，停止压测");
					stopStress();
					return;
				}

				var result = buildSign(typeVal);

				addStressLog("info", "#" + stressCount + " 金额=" + amountStr + " 元 → 推送中…");

				axios.post('https://open.gzfyit.com/iot-cloud/v1/third/send', result.params)
					.then(function(response) {
						stressSuccess++;
						var code = response.data && response.data.code;
						var msg = response.data && (response.data.msg || response.data.message);
						addStressLog("success", "#" + stressCount + " 金额=" + amountStr + " ✓ " + (msg || JSON.stringify(response.data)));
						$("#response").text(JSON.stringify(response.data));
						$("#strText").text(result.string);
						$("#signTxt").text(result.sign);
						$("#parameter").text(JSON.stringify(result.params));
						updateStressProgress();
					})
					.catch(function(error) {
						stressFail++;
						addStressLog("error", "#" + stressCount + " 金额=" + amountStr + " ✗ " + (error.message || "网络错误"));
						updateStressProgress();
					});

				// 累加金额
				stressCurrentAmount += step;

				// 检查是否达到次数上限
				if (totalCountVal > 0 && stressCount >= totalCountVal) {
					addStressLog("info", "已推送 " + stressCount + " 次，达到上限，停止压测");
					stopStress();
				}
			}

			function updateStressProgress() {
				var totalCountVal = parseInt($("#totalCount").val()) || 0;
				var progressText = "已推送: " + stressCount;
				if (totalCountVal > 0) {
					progressText += " / " + totalCountVal;
				}
				progressText += " | 成功: " + stressSuccess + " | 失败: " + stressFail;
				if (stressCount > 0) {
					progressText += " | 成功率: " + (stressSuccess / stressCount * 100).toFixed(1) + "%";
				}
				$("#stressProgress").text(progressText);
			}

			function stopStress() {
				stressRunning = false;
				if (stressTimer) {
					clearInterval(stressTimer);
					stressTimer = null;
				}
				setStressStatus("stopped", $("#stressProgress").text());
				$("#stressStartBtn").prop("disabled", false);
				$("#stressStopBtn").prop("disabled", true);
			}

			$("#stressStartBtn").click(function() {
				var appKey = $("input[name='appKey']");
				var appSecret = $("input[name='appSecret']");
				var device = $("input[name='device']");

				if (appKey.val() == "") return alert("请先填写 appKey");
				if (appSecret.val() == "") return alert("请先填写 appSecret");
				if (device.val() == "") return alert("请先填写 device");

				var interval = parseFloat($("#intervalSec").val());
				if (!interval || interval < 0.5) return alert("推送间隔不能小于 0.5 秒");

				// 重置状态
				stressCount = 0;
				stressSuccess = 0;
				stressFail = 0;
				stressCurrentAmount = parseFloat($("#initAmount").val()) || 0.01;
				stressRunning = true;

				setStressStatus("running", "准备开始…");
				$("#stressStartBtn").prop("disabled", true);
				$("#stressStopBtn").prop("disabled", false);

				addStressLog("info", "====== 压力测试开始 ======");
				addStressLog("info", "起始金额: " + stressCurrentAmount.toFixed(2) + " 元 | 步长: " + (parseFloat($("#stepAmount").val()) || 0.01).toFixed(2) + " 元 | 间隔: " + interval + " 秒");

				// 立即推送第一笔
				doStressPush();

				// 定时推送
				stressTimer = setInterval(function() {
					doStressPush();
				}, interval * 1000);
			});

			$("#stressStopBtn").click(function() {
				addStressLog("info", "手动停止压测，共推送 " + stressCount + " 次");
				stopStress();
			});

			$("#stressClearBtn").click(function() {
				$("#stressLog").html('<div class="log-empty">等待开始推送…</div>');
				stressCount = 0;
				stressSuccess = 0;
				stressFail = 0;
				$("#stressProgress").text("--");
				setStressStatus("idle", "--");
			});
		});
	</script>

</body>
</html>
